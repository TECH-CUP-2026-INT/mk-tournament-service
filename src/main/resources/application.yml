server:
  port: ${SERVER_PORT:5623}

spring:
  application:
    name: service-tournament
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}
  rabbitmq:
    host: toucan.lmq.cloudamqp.com
    port: 5671
    username: exdntvvm
    password: ${RABBITMQ_PASS:}
    virtual-host: exdntvvm
    ssl:
      enabled: true

# TC-109: URL del Payment Service. localhost:8081 solo como default de
# desarrollo (ese puerto no resuelve en Azure) -- en despliegue se debe
# fijar PAYMENT_SERVICE_URL. Mientras el servicio real no esté disponible
# en el entorno apuntado, las llamadas a GET /payment-orders/{enrollmentId}
# caen a UNKNOWN por timeout.
payment-service:
  base-url: ${PAYMENT_SERVICE_URL:http://localhost:8081}

# URL del Team Service. Mismo criterio que payment-service: localhost:8082
# es el default de desarrollo, en despliegue se debe fijar TEAM_SERVICE_URL.
# Mientras el servicio real no esté disponible en el entorno apuntado, las
# llamadas a GET /teams/{teamId} fallan con TeamServiceUnavailableException.
team-service:
  base-url: ${TEAM_SERVICE_URL:http://localhost:8082}

# URL de Matches y llave interna para POST /api/partidos (empuje de la definición
# del partido al programarse, ver MatchDefinitionRestAdapter). Ninguno de los dos
# está hardcodeado: configurables por env var para no depender de un valor fijo
# mientras Matches no haya pusheado su rama.
matches-service:
  base-url: ${MATCHES_SERVICE_URL:http://localhost:8083}
  internal-api-key: ${INTERNAL_API_KEY:}

# Feign clients (payment-service, team-service, matches-service)
feign:
  client:
    config:
      default:
        connectTimeout: 2500
        readTimeout: 2500

# Swagger / SpringDoc
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    try-it-out-enabled: true
  api-docs:
    path: /v3/api-docs
