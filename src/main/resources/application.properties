spring.application.name=service-tournament
spring.data.mongodb.uri=mongodb://localhost:27017/techcup_tournaments
# TC-109: URL del Payment Service (aun no desplegado en este entorno); las
# llamadas a GET /payment-orders/{enrollmentId} caen a UNKNOWN por timeout hasta que exista.
payment-service.base-url=http://localhost:8081
# URL del Team Service (aun no desplegado en este entorno); las llamadas a
# GET /teams/{teamId} fallan con TeamServiceUnavailableException hasta que exista.
team-service.base-url=http://localhost:8082

# Feign clients (payment-service, team-service)
feign.client.config.default.connectTimeout=2500
feign.client.config.default.readTimeout=2500

# Swagger / SpringDoc
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
